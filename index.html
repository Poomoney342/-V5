<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>แยกประเภทวัสดุ 🧱</title>
<style>
  :root {
    --wood-color:#92400E;    --wood-bg:#FEF3C7;
    --paper-color:#A16207;   --paper-bg:#FEFCE8;
    --metal-color:#475569;   --metal-bg:#F1F5F9;
    --rubber-color:#15803D;  --rubber-bg:#DCFCE7;
    --fabric-color:#BE185D;  --fabric-bg:#FCE7F3;
    --plastic-color:#0369A1; --plastic-bg:#E0F2FE;
    --glass-color:#0E7490;   --glass-bg:#ECFEFF;
    --shadow:0 4px 20px rgba(0,0,0,0.11);
    --text:#1E293B;
  }
  *{margin:0;padding:0;box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    -webkit-touch-callout:none;
    touch-action:pan-y; /* allow scroll, override per-element */
  }
  body{
    font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;
    background:#F8FAFC;min-height:100vh;padding-bottom:50px;
    background-image:
      radial-gradient(ellipse at 0% 0%,#FFF8EC 0%,transparent 50%),
      radial-gradient(ellipse at 100% 100%,#EFF6FF 0%,transparent 50%);
    /* prevent pull-to-refresh interfering */
    overscroll-behavior:none;
  }

  header{text-align:center;padding:28px 16px 8px;}
  header h1{font-size:clamp(1.5rem,4vw,2.3rem);font-weight:900;color:var(--text);}
  header h1 span{
    background:linear-gradient(120deg,#92400E,#0369A1);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  header p{color:#64748B;font-size:0.92rem;margin-top:5px;}

  /* MODE BADGE */
  #mode-badge{
    display:inline-flex;align-items:center;gap:6px;
    background:white;border-radius:50px;padding:6px 16px;
    margin:8px auto 0;font-size:0.82rem;font-weight:700;
    color:#475569;box-shadow:var(--shadow);
  }
  #mode-badge .dot{width:8px;height:8px;border-radius:50%;background:#94A3B8;transition:background 0.3s;}
  #mode-badge.touch .dot{background:#22C55E;}
  #mode-badge.mouse .dot{background:#3B82F6;}

  /* HINT BANNER */
  .hint-banner{
    display:flex;align-items:center;justify-content:center;
    background:white;border-radius:50px;padding:10px 22px;
    margin:10px auto;max-width:460px;box-shadow:var(--shadow);
    font-size:0.9rem;font-weight:600;color:#475569;
    border:2px solid transparent;transition:all 0.25s;
  }
  .hint-banner.active{background:#FFFBEB;border-color:#F59E0B;color:#92400E;}

  /* SCORE */
  .score-bar{display:flex;justify-content:center;gap:10px;margin:4px 16px 12px;flex-wrap:wrap;}
  .score-chip{background:white;border-radius:50px;padding:7px 18px;font-weight:700;font-size:0.9rem;box-shadow:var(--shadow);}

  /* TRAY */
  .tray-label{text-align:center;font-size:0.95rem;font-weight:600;color:#64748B;margin-bottom:8px;}
  #items-tray{
    display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:14px;
    max-width:900px;margin:0 auto 18px;background:white;border-radius:24px;
    box-shadow:var(--shadow);min-height:88px;border:3px dashed #E2E8F0;
    transition:border-color 0.25s;
  }
  #items-tray.tray-active{border-color:#F59E0B;border-style:solid;}

  /* CARDS */
  .item-card{
    background:white;border-radius:16px;padding:11px 13px;
    box-shadow:0 3px 12px rgba(0,0,0,0.10);
    -webkit-user-select:none;user-select:none;
    display:flex;flex-direction:column;align-items:center;gap:4px;
    border:3px solid transparent;
    transition:transform 0.15s,box-shadow 0.15s,border-color 0.15s,background 0.15s;
    min-width:76px;text-align:center;
    cursor:grab;
    touch-action:none; /* critical: lets JS handle all touch on cards */
  }
  .item-card .emoji{font-size:1.9rem;line-height:1;}
  .item-card .name{font-size:0.76rem;font-weight:600;color:var(--text);}

  .item-card.selected{
    border-color:#F59E0B;background:#FFFBEB;
    transform:scale(1.1) translateY(-5px);
    box-shadow:0 12px 30px rgba(245,158,11,0.4);
  }
  .item-card.dragging{opacity:0.3;transform:scale(0.95);pointer-events:none;}
  .item-card.ghost{
    position:fixed;pointer-events:none;z-index:9999;opacity:0.96;
    transform:rotate(4deg) scale(1.1);
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
    transition:none;will-change:left,top;
  }
  .item-card.placed{cursor:default;padding:8px 10px;min-width:64px;touch-action:auto;}
  .item-card.placed .emoji{font-size:1.5rem;}
  .item-card.placed .name{font-size:0.68rem;}
  .item-card.correct{border-color:#22C55E!important;background:#F0FDF4!important;animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);}
  .item-card.wrong{border-color:#EF4444!important;background:#FEF2F2!important;animation:shake 0.4s ease;}

  @keyframes popIn{0%{transform:scale(0.4) rotate(-8deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-10px);}75%{transform:translateX(10px);}}

  /* ZONES */
  .zones-row{
    display:flex;justify-content:center;flex-wrap:wrap;
    gap:12px;max-width:920px;margin:0 auto 12px;padding:0 14px;
  }
  .drop-zone{
    border-radius:20px;padding:14px 10px 16px;min-height:175px;width:118px;
    display:flex;flex-direction:column;align-items:center;gap:8px;
    border:3px solid transparent;
    transition:transform 0.2s,box-shadow 0.2s,border-color 0.2s;
    touch-action:none; /* zones also need to receive touch drop */
  }
  .drop-zone[data-type="wood"]   {background:var(--wood-bg);}
  .drop-zone[data-type="paper"]  {background:var(--paper-bg);}
  .drop-zone[data-type="metal"]  {background:var(--metal-bg);}
  .drop-zone[data-type="rubber"] {background:var(--rubber-bg);}
  .drop-zone[data-type="fabric"] {background:var(--fabric-bg);}
  .drop-zone[data-type="plastic"]{background:var(--plastic-bg);}
  .drop-zone[data-type="glass"]  {background:var(--glass-bg);}

  .drop-zone.droppable{animation:pulse 1.1s ease-in-out infinite;box-shadow:0 6px 20px rgba(0,0,0,0.12);}
  .drop-zone[data-type="wood"].droppable   {border-color:var(--wood-color);}
  .drop-zone[data-type="paper"].droppable  {border-color:var(--paper-color);}
  .drop-zone[data-type="metal"].droppable  {border-color:var(--metal-color);}
  .drop-zone[data-type="rubber"].droppable {border-color:var(--rubber-color);}
  .drop-zone[data-type="fabric"].droppable {border-color:var(--fabric-color);}
  .drop-zone[data-type="plastic"].droppable{border-color:var(--plastic-color);}
  .drop-zone[data-type="glass"].droppable  {border-color:var(--glass-color);}

  .drop-zone.drag-over{transform:scale(1.06)!important;animation:none!important;}
  .drop-zone[data-type="wood"].drag-over   {border-color:var(--wood-color);   box-shadow:0 8px 28px rgba(146,64,14,0.35);}
  .drop-zone[data-type="paper"].drag-over  {border-color:var(--paper-color);  box-shadow:0 8px 28px rgba(161,98,7,0.35);}
  .drop-zone[data-type="metal"].drag-over  {border-color:var(--metal-color);  box-shadow:0 8px 28px rgba(71,85,105,0.35);}
  .drop-zone[data-type="rubber"].drag-over {border-color:var(--rubber-color); box-shadow:0 8px 28px rgba(21,128,61,0.35);}
  .drop-zone[data-type="fabric"].drag-over {border-color:var(--fabric-color); box-shadow:0 8px 28px rgba(190,24,93,0.35);}
  .drop-zone[data-type="plastic"].drag-over{border-color:var(--plastic-color);box-shadow:0 8px 28px rgba(3,105,161,0.35);}
  .drop-zone[data-type="glass"].drag-over  {border-color:var(--glass-color);  box-shadow:0 8px 28px rgba(14,116,144,0.35);}

  @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.03);}}

  .zone-icon{font-size:1.9rem;}
  .zone-title{font-size:0.92rem;font-weight:800;margin-top:2px;}
  .drop-zone[data-type="wood"]    .zone-title{color:var(--wood-color);}
  .drop-zone[data-type="paper"]   .zone-title{color:var(--paper-color);}
  .drop-zone[data-type="metal"]   .zone-title{color:var(--metal-color);}
  .drop-zone[data-type="rubber"]  .zone-title{color:var(--rubber-color);}
  .drop-zone[data-type="fabric"]  .zone-title{color:var(--fabric-color);}
  .drop-zone[data-type="plastic"] .zone-title{color:var(--plastic-color);}
  .drop-zone[data-type="glass"]   .zone-title{color:var(--glass-color);}

  .zone-items{display:flex;flex-wrap:wrap;justify-content:center;gap:5px;width:100%;pointer-events:none;}

  /* TOAST */
  #toast{
    position:fixed;top:16px;left:50%;
    transform:translateX(-50%) translateY(-110px);
    background:white;border-radius:50px;padding:12px 28px;
    font-size:1rem;font-weight:700;
    box-shadow:0 8px 28px rgba(0,0,0,0.18);z-index:99999;
    transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events:none;white-space:nowrap;max-width:92vw;
  }
  #toast.show{transform:translateX(-50%) translateY(0);}
  #toast.correct{border-left:5px solid #22C55E;color:#15803D;}
  #toast.wrong  {border-left:5px solid #EF4444;color:#B91C1C;}

  /* WIN */
  #win-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,0.65);z-index:20000;align-items:center;justify-content:center;padding:20px;}
  #win-overlay.show{display:flex;}
  .win-card{background:white;border-radius:32px;padding:40px 44px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,0.3);animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);max-width:360px;width:100%;}
  .win-card .trophy{font-size:5rem;}
  .win-card h2{font-size:2rem;font-weight:900;background:linear-gradient(120deg,#92400E,#0369A1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:10px 0 6px;}
  .win-card p{color:#64748B;margin-bottom:14px;}
  #final-score-text{font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:24px;}
  .btn-play{background:linear-gradient(120deg,#92400E,#0369A1);color:white;border:none;border-radius:50px;padding:14px 40px;font-size:1.05rem;font-weight:700;cursor:pointer;}
  .btn-reset{background:white;color:#0369A1;border:2px solid #0369A1;border-radius:50px;padding:10px 28px;font-size:0.95rem;font-weight:700;cursor:pointer;display:block;margin:20px auto 0;}

  .particle{position:fixed;font-size:1.3rem;pointer-events:none;z-index:19998;animation:floatUp 1.4s ease forwards;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-130px) scale(0.3);}}
</style>
</head>
<body>

<div id="toast"></div>
<div id="win-overlay">
  <div class="win-card">
    <div class="trophy">🏆</div>
    <h2>เก่งมากเลย!</h2>
    <p>แยกประเภทวัสดุได้ครบทุกชิ้น!</p>
    <div id="final-score-text"></div>
    <button class="btn-play" onclick="resetGame()">▶ เล่นอีกครั้ง</button>
  </div>
</div>

<header>
  <h1>🧱 <span>แยกประเภทวัสดุ</span></h1>
  <p>รองรับ: เมาส์ลากวาง · Touch Screen ลากวาง · แตะเลือก</p>
  <div id="mode-badge"><div class="dot"></div><span id="mode-text">กำลังตรวจสอบอุปกรณ์...</span></div>
</header>

<div class="hint-banner" id="hint-banner">👆 แตะหรือลากวัตถุเพื่อเริ่ม</div>

<div class="score-bar">
  <div class="score-chip">✅ ถูก: <span id="sc" style="color:#22C55E">0</span></div>
  <div class="score-chip">❌ ผิด: <span id="sw" style="color:#EF4444">0</span></div>
  <div class="score-chip">🎯 เหลือ: <span id="sr">0</span></div>
</div>

<div style="max-width:900px;margin:0 auto;padding:0 14px;">
  <div class="tray-label">⬇️ เลือกวัตถุแล้วใส่ช่องที่ถูกต้อง</div>
  <div id="items-tray"></div>
</div>

<div class="zones-row">
  <div class="drop-zone" data-type="wood"    onclick="handleZoneClick('wood')">
    <div class="zone-icon">🪵</div><div class="zone-title">ไม้</div>
    <div class="zone-items" id="zone-wood"></div>
  </div>
  <div class="drop-zone" data-type="paper"   onclick="handleZoneClick('paper')">
    <div class="zone-icon">📄</div><div class="zone-title">กระดาษ</div>
    <div class="zone-items" id="zone-paper"></div>
  </div>
  <div class="drop-zone" data-type="metal"   onclick="handleZoneClick('metal')">
    <div class="zone-icon">⚙️</div><div class="zone-title">โลหะ</div>
    <div class="zone-items" id="zone-metal"></div>
  </div>
  <div class="drop-zone" data-type="rubber"  onclick="handleZoneClick('rubber')">
    <div class="zone-icon">🔵</div><div class="zone-title">ยาง</div>
    <div class="zone-items" id="zone-rubber"></div>
  </div>
  <div class="drop-zone" data-type="fabric"  onclick="handleZoneClick('fabric')">
    <div class="zone-icon">🧵</div><div class="zone-title">ผ้า</div>
    <div class="zone-items" id="zone-fabric"></div>
  </div>
  <div class="drop-zone" data-type="plastic" onclick="handleZoneClick('plastic')">
    <div class="zone-icon">🧴</div><div class="zone-title">พลาสติก</div>
    <div class="zone-items" id="zone-plastic"></div>
  </div>
  <div class="drop-zone" data-type="glass"   onclick="handleZoneClick('glass')">
    <div class="zone-icon">🪟</div><div class="zone-title">แก้ว</div>
    <div class="zone-items" id="zone-glass"></div>
  </div>
</div>

<div style="text-align:center;margin-top:10px;">
  <button class="btn-reset" onclick="resetGame()">🔄 เริ่มใหม่</button>
</div>

<script>
var ITEMS=[
  {id:'chopstick',emoji:'🥢',name:'ตะเกียบ',      type:'wood'},
  {id:'pencil',   emoji:'✏️',name:'ดินสอ',         type:'wood'},
  {id:'ruler',    emoji:'📏',name:'ไม้บรรทัด',    type:'wood'},
  {id:'door',     emoji:'🚪',name:'ประตูไม้',      type:'wood'},
  {id:'book',     emoji:'📚',name:'หนังสือ',       type:'paper'},
  {id:'newspaper',emoji:'📰',name:'หนังสือพิมพ์', type:'paper'},
  {id:'box',      emoji:'📦',name:'กล่องกระดาษ',  type:'paper'},
  {id:'tissue',   emoji:'🧻',name:'กระดาษทิชชู', type:'paper'},
  {id:'coin',     emoji:'🪙',name:'เหรียญ',        type:'metal'},
  {id:'key',      emoji:'🔑',name:'กุญแจ',         type:'metal'},
  {id:'scissors', emoji:'✂️',name:'กรรไกร',        type:'metal'},
  {id:'can',      emoji:'🥫',name:'กระป๋อง',       type:'metal'},
  {id:'tire',     emoji:'🛞',name:'ยางรถ',         type:'rubber'},
  {id:'glove',    emoji:'🧤',name:'ถุงมือยาง',    type:'rubber'},
  {id:'eraser',   emoji:'🩹',name:'ยางลบ',         type:'rubber'},
  {id:'shirt',    emoji:'👕',name:'เสื้อ',          type:'fabric'},
  {id:'pants',    emoji:'👖',name:'กางเกง',        type:'fabric'},
  {id:'towel',    emoji:'🧣',name:'ผ้าเช็ดตัว',   type:'fabric'},
  {id:'hat',      emoji:'🧢',name:'หมวก',          type:'fabric'},
  {id:'bottle',   emoji:'🍶',name:'ขวดน้ำ',        type:'plastic'},
  {id:'bag',      emoji:'🛍️',name:'ถุงพลาสติก',  type:'plastic'},
  {id:'straw',    emoji:'🥤',name:'หลอดดูด',       type:'plastic'},
  {id:'bucket',   emoji:'🪣',name:'ถังน้ำ',        type:'plastic'},
  {id:'cup',      emoji:'🥛',name:'แก้วน้ำ',       type:'glass'},
  {id:'window',   emoji:'🪟',name:'กระจก',         type:'glass'},
  {id:'glasses',  emoji:'👓',name:'แว่นตา',        type:'glass'},
  {id:'jar',      emoji:'🫙',name:'ขวดแก้ว',       type:'glass'},
];

var scoreCorrect=0, scoreWrong=0;
var dragItem=null, ghostEl=null, lastZone=null;
var selectedId=null;
var isDragging=false;

/* ── Detect input type ── */
var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints>0);
(function(){
  var badge=document.getElementById('mode-badge');
  var txt=document.getElementById('mode-text');
  if(isTouchDevice){
    badge.classList.add('touch');
    txt.textContent='Touch Screen พร้อมใช้งาน ✓';
  } else {
    badge.classList.add('mouse');
    txt.textContent='เมาส์พร้อมใช้งาน ✓';
  }
})();

/* ── Helpers ── */
function getItem(id){for(var i=0;i<ITEMS.length;i++){if(ITEMS[i].id===id)return ITEMS[i];}return null;}
function shuffle(a){
  var b=a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}
function typeLabel(t){
  return{wood:'ไม้',paper:'กระดาษ',metal:'โลหะ',rubber:'ยาง',fabric:'ผ้า',plastic:'พลาสติก',glass:'แก้ว'}[t]||t;
}
function setHint(msg,active){
  var b=document.getElementById('hint-banner');
  b.textContent=msg;
  b.className='hint-banner'+(active?' active':'');
}
function updateScore(){
  document.getElementById('sc').textContent=scoreCorrect;
  document.getElementById('sw').textContent=scoreWrong;
  document.getElementById('sr').textContent=document.getElementById('items-tray').children.length;
}

/* ── Build tray ── */
function buildTray(items){
  var tray=document.getElementById('items-tray');
  tray.innerHTML='';
  for(var i=0;i<items.length;i++){
    (function(item){
      var c=document.createElement('div');
      c.className='item-card';
      c.setAttribute('data-id',item.id);
      c.setAttribute('data-type',item.type);
      c.innerHTML='<div class="emoji">'+item.emoji+'</div><div class="name">'+item.name+'</div>';
      // Mouse
      c.addEventListener('mousedown',function(e){startDragMouse(e,item.id,c);});
      // Touch (covers both phone and touch screen monitor)
      c.addEventListener('touchstart',function(e){startDragTouch(e,item.id,c);},{passive:false});
      tray.appendChild(c);
    })(items[i]);
  }
  updateScore();
}

/* ══════════════════════════════════
   MOUSE DRAG
══════════════════════════════════ */
function startDragMouse(e,id,card){
  var startX=e.clientX, startY=e.clientY;
  var moved=false;
  var scrollInterval=null;

  function doAutoScroll(clientY){
    clearInterval(scrollInterval);
    var threshold=80;
    var speed=0;
    if(clientY > window.innerHeight - threshold){
      speed = Math.round((clientY-(window.innerHeight-threshold))/(threshold/12));
    } else if(clientY < threshold){
      speed = -Math.round((threshold-clientY)/(threshold/12));
    }
    if(speed!==0){
      scrollInterval=setInterval(function(){ window.scrollBy(0,speed); },16);
    }
  }

  function onMove(ev){
    if(!moved&&(Math.abs(ev.clientX-startX)>5||Math.abs(ev.clientY-startY)>5)){
      moved=true; isDragging=true;
      if(selectedId) tapDeselect();
      dragItem=card;
      card.classList.add('dragging');
      createGhost(card,ev.clientX,ev.clientY);
    }
    if(moved){
      moveGhost(ev.clientX,ev.clientY);
      highlightZone(ev.clientX,ev.clientY);
      doAutoScroll(ev.clientY);
    }
  }
  function onUp(ev){
    clearInterval(scrollInterval);
    document.removeEventListener('mousemove',onMove);
    document.removeEventListener('mouseup',onUp);
    if(moved){
      var zone=getZoneAt(ev.clientX,ev.clientY);
      if(zone) commitDrop(id,zone,card);
      cleanup();
    } else {
      isDragging=false;
      handleCardTap(id);
    }
  }
  document.addEventListener('mousemove',onMove);
  document.addEventListener('mouseup',onUp);
}

/* ══════════════════════════════════
   TOUCH DRAG — works on phone AND
   external touch screen monitors
══════════════════════════════════ */
function startDragTouch(e,id,card){
  var t0=e.touches[0];
  var startX=t0.clientX, startY=t0.clientY;
  var moved=false;
  var longPressTimer=null;
  // ไม่ preventDefault ตรงนี้ → ให้ scroll ได้ปกติก่อน

  function onMove(ev){
    var t=ev.touches[0];
    var dx=Math.abs(t.clientX-startX), dy=Math.abs(t.clientY-startY);
    if(!moved&&(dx>8||dy>8)){
      // ตรวจว่าขยับแนวนอนมากกว่าแนวตั้ง → ถือว่า drag ไม่ใช่ scroll
      if(dx > dy){
        moved=true; isDragging=true;
        clearTimeout(longPressTimer);
        if(selectedId) tapDeselect();
        dragItem=card;
        card.classList.add('dragging');
        createGhost(card,t.clientX,t.clientY);
      } else {
        // ขยับแนวตั้งมากกว่า = user กำลัง scroll → ยกเลิก drag
        document.removeEventListener('touchmove',onMove,{passive:false});
        document.removeEventListener('touchend',onEnd);
        document.removeEventListener('touchcancel',onEnd);
        return;
      }
    }
    if(moved){
      ev.preventDefault(); // ป้องกัน scroll เฉพาะตอน drag จริงๆ
      moveGhost(t.clientX,t.clientY);
      highlightZone(t.clientX,t.clientY);
      // Auto-scroll เมื่อลากใกล้ขอบบน/ล่าง
      var threshold=80;
      if(t.clientY > window.innerHeight - threshold){
        window.scrollBy(0, 8);
      } else if(t.clientY < threshold){
        window.scrollBy(0, -8);
      }
    }
  }
  function onEnd(ev){
    clearTimeout(longPressTimer);
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
    document.removeEventListener('touchcancel',onEnd);
    if(moved){
      var t=ev.changedTouches[0];
      // Use elementFromPoint to find zone under finger
      // Hide ghost so it doesn't block hit test
      if(ghostEl) ghostEl.style.display='none';
      var el=document.elementFromPoint(t.clientX,t.clientY);
      if(ghostEl) ghostEl.style.display='';
      var zone=findZoneElement(el);
      if(zone) commitDrop(id,zone,card);
      cleanup();
    } else {
      isDragging=false;
      handleCardTap(id);
    }
  }

  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd,{passive:true});
  document.addEventListener('touchcancel',onEnd,{passive:true});
}

/* Find drop-zone from element or its parents */
function findZoneElement(el){
  while(el){
    if(el.classList&&el.classList.contains('drop-zone')) return el;
    el=el.parentElement;
  }
  return null;
}

/* ══════════════════════════════════
   GHOST & ZONE HIGHLIGHT
══════════════════════════════════ */
function createGhost(card,cx,cy){
  ghostEl=card.cloneNode(true);
  ghostEl.className='item-card ghost';
  ghostEl.style.width=card.offsetWidth+'px';
  ghostEl.style.height=card.offsetHeight+'px';
  moveGhostTo(cx,cy,card.offsetWidth,card.offsetHeight);
  document.body.appendChild(ghostEl);
}
function moveGhostTo(cx,cy,w,h){
  w=w||ghostEl.offsetWidth; h=h||ghostEl.offsetHeight;
  ghostEl.style.left=(cx-w/2)+'px';
  ghostEl.style.top=(cy-h/2)+'px';
}
function moveGhost(cx,cy){ if(ghostEl) moveGhostTo(cx,cy); }

function highlightZone(cx,cy){
  var z=getZoneAt(cx,cy);
  if(z!==lastZone){
    if(lastZone)lastZone.classList.remove('drag-over');
    if(z)z.classList.add('drag-over');
    lastZone=z;
  }
}
function getZoneAt(cx,cy){
  var zones=document.querySelectorAll('.drop-zone');
  for(var i=0;i<zones.length;i++){
    var r=zones[i].getBoundingClientRect();
    if(cx>=r.left&&cx<=r.right&&cy>=r.top&&cy<=r.bottom) return zones[i];
  }
  return null;
}
function cleanup(){
  if(dragItem)dragItem.classList.remove('dragging');
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  if(lastZone){lastZone.classList.remove('drag-over');lastZone=null;}
  dragItem=null; isDragging=false;
}

/* ══════════════════════════════════
   TAP MODE (แตะเลือก → แตะช่อง)
══════════════════════════════════ */
function handleCardTap(id){
  if(isDragging) return;
  if(selectedId===id){tapDeselect();return;}
  if(selectedId){
    var old=document.querySelector('#items-tray .item-card[data-id="'+selectedId+'"]');
    if(old) old.classList.remove('selected');
  }
  selectedId=id;
  var card=document.querySelector('#items-tray .item-card[data-id="'+id+'"]');
  if(card) card.classList.add('selected');
  document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.add('droppable');});
  document.getElementById('items-tray').classList.add('tray-active');
  var item=getItem(id);
  setHint(item.emoji+' '+item.name+' → แตะช่องที่ถูกต้อง!',true);
}
function handleZoneClick(zoneType){
  if(!selectedId) return;
  var item=getItem(selectedId);
  var srcCard=document.querySelector('#items-tray .item-card[data-id="'+selectedId+'"]');
  var zone=document.querySelector('.drop-zone[data-type="'+zoneType+'"]');
  commitDrop(selectedId,zone,srcCard);
  tapDeselect();
}
function tapDeselect(){
  if(selectedId){
    var c=document.querySelector('#items-tray .item-card[data-id="'+selectedId+'"]');
    if(c) c.classList.remove('selected');
  }
  selectedId=null;
  document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('droppable');});
  document.getElementById('items-tray').classList.remove('tray-active');
  setHint('👆 แตะหรือลากวัตถุเพื่อเริ่ม',false);
}

/* ══════════════════════════════════
   DROP LOGIC (shared)
══════════════════════════════════ */
function commitDrop(id,zone,srcCard){
  var item=getItem(id);
  if(!item||!zone) return;
  var zoneType=zone.getAttribute('data-type');
  var zoneItems=zone.querySelector('.zone-items');

  var placed=document.createElement('div');
  placed.className='item-card placed';
  placed.innerHTML='<div class="emoji">'+item.emoji+'</div><div class="name">'+item.name+'</div>';

  if(zoneType===item.type){
    placed.classList.add('correct');
    scoreCorrect++;
    showToast('✅ ถูกต้อง! '+item.emoji+' '+item.name+' ทำจาก'+typeLabel(item.type),'correct');
    spawnParticles(zone);
    if(srcCard) srcCard.remove();
    zoneItems.appendChild(placed);
    checkWin();
  } else {
    placed.classList.add('wrong');
    scoreWrong++;
    showToast('❌ ลองใหม่! '+item.emoji+' '+item.name+' ไม่ใช่'+typeLabel(zoneType)+'นะ','wrong');
    zoneItems.appendChild(placed);
    setTimeout(function(){placed.remove();},800);
  }
  updateScore();
}

/* ══════════════════════════════════
   UI HELPERS
══════════════════════════════════ */
function checkWin(){
  if(document.getElementById('items-tray').children.length===0){
    setTimeout(function(){
      document.getElementById('final-score-text').textContent='✅ ถูก '+scoreCorrect+' ข้อ  ❌ ผิด '+scoreWrong+' ข้อ';
      document.getElementById('win-overlay').classList.add('show');
    },700);
  }
}
var toastTimer;
function showToast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=msg;t.className='show '+type;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.className='';},2400);
}
function spawnParticles(el){
  var r=el.getBoundingClientRect();
  var em=['⭐','🌟','✨','💫'];
  for(var i=0;i<4;i++){
    (function(i){
      var p=document.createElement('div');
      p.className='particle';p.textContent=em[i];
      p.style.left=(r.left+10+Math.random()*(r.width-20))+'px';
      p.style.top=(r.top+10+Math.random()*(r.height-20))+'px';
      p.style.animationDelay=(i*0.08)+'s';
      document.body.appendChild(p);
      setTimeout(function(){p.remove();},1600);
    })(i);
  }
}
function resetGame(){
  scoreCorrect=0;scoreWrong=0;selectedId=null;isDragging=false;
  ['wood','paper','metal','rubber','fabric','plastic','glass'].forEach(function(t){
    document.getElementById('zone-'+t).innerHTML='';
  });
  document.getElementById('win-overlay').classList.remove('show');
  document.querySelectorAll('.drop-zone').forEach(function(z){z.classList.remove('droppable','drag-over');});
  cleanup();
  setHint('👆 แตะหรือลากวัตถุเพื่อเริ่ม',false);
  buildTray(shuffle(ITEMS));
}

resetGame();
</script>
